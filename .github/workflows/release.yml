name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./make-app.sh

      - name: Zip app
        run: ditto -c -k --keepParent RuEnHelper.app RuEnHelper.app.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RuEnHelper.app.zip

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: RuEnHelper.app
          path: RuEnHelper.app.zip
